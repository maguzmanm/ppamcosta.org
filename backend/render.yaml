services:
  - type: web
    name: ppam-api
    env: node
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node start-render.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: no-reply@ppam.org
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

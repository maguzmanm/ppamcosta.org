# =============================================
# PPAM Costa - Nginx Configuration
# Domains: ppamcosta.org, guzmanm.net, mguzman.pro
# Path: /etc/nginx/conf.d/ppamcosta.conf
# =============================================

server {
    listen 80;
    server_name ppamcosta.org www.ppamcosta.org guzmanm.net www.guzmanm.net mguzman.pro www.mguzman.pro;

    root /opt/ppamcosta.org/web/dist;
    index index.html;

    # ── SPA + PWA: servir index.html para todas las rutas ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API: proxy reverso al backend Node.js ──
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Cache de assets estáticos (1 año) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── PWA manifest ──
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
    }

    # ── Service Worker ──
    location = /sw.js {
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-cache";
    }

    # ── Seguridad: denegar acceso a archivos ocultos ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}


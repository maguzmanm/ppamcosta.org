  <!-- Ventanas --><rect x="150" y="255" width="6" height="8" fill="#FFD166" rx="1"/><rect x="165" y="255" width="6" height="8" fill="#FFD166" rx="1"/><rect x="150" y="275" width="6" height="8" fill="#FFD166" rx="1"/><rect x="200" y="275" width="6" height="8" fill="#FFD166" rx="1"/><rect x="220" y="275" width="6" height="8" fill="#FFD166" rx="1"/><rect x="200" y="295" width="6" height="8" fill="#FFD166" rx="1"/><rect x="265" y="240" width="6" height="8" fill="#FFD166" rx="1"/><rect x="265" y="260" width="6" height="8" fill="#FFD166" rx="1"/><rect x="265" y="280" width="6" height="8" fill="#FFD166" rx="1"/><rect x="310" y="290" width="6" height="8" fill="#FFD166" rx="1"/><rect x="335" y="290" width="6" height="8" fill="#FFD166" rx="1"/><rect x="310" y="310" width="6" height="8" fill="#FFD166" rx="1"/><rect x="380" y="265" width="6" height="8" fill="#FFD166" rx="1"/><rect x="395" y="265" width="6" height="8" fill="#FFD166" rx="1"/>
  
